<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Login - ETERNITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="in-style.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Premium Generated Background image replacing old mp4 -->
    <img class="bg-video" src="login_bg.png" alt="Cyber City Background" style="object-fit: cover;" />
    <div class="video-overlay"></div>

    <div class="login-wrapper">
      <a href="index.html" class="back-link"><i class="ri-arrow-left-line"></i> RETURN TO BASE</a>
      
      <div class="cyber-login-panel">
        <div class="panel-header">
           <i class="ri-gamepad-line login-logo" style="font-size: 60px; color: var(--neon-cyan); display: inline-block;"></i>
           <h2>ACCESS UPLINK</h2>
           <div class="neon-divider"></div>
        </div>

        <form action="#" class="cyber-form">
          <div class="input-group">
            <i class="ri-mail-line icon"></i>
            <input type="email" id="email" required placeholder=" " />
            <label for="email">Uplink Code (Email)</label>
          </div>

          <div class="input-group">
            <i class="ri-lock-fill icon"></i>
            <input type="password" id="pass" required placeholder=" " />
            <label for="pass">Security Key</label>
          </div>

          <div class="form-actions">
            <label class="cyber-checkbox">
              <input type="checkbox" id="cb" />
              <span>Remember Protocol</span>
            </label>
            <a href="#" class="forgot-link">Bypass Key?</a>
          </div>

          <button type="button" class="btn-cyber">INITIALIZE LINK</button>
        </form>

        <div class="social-login">
          <p>-- OR SYNC VIA --</p>
          <div class="social-grid">
            <a href="#"><i class="ri-google-fill"></i></a>
            <a href="#"><i class="ri-discord-fill"></i></a>
            <a href="#"><i class="ri-github-fill"></i></a>
            <a href="#"><i class="ri-twitch-fill"></i></a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
