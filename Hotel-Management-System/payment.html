<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SEPM I</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; max-width: 1000px; margin: 150px auto 100px; }
        @media(max-width: 800px) { .checkout-grid { grid-template-columns: 1fr; } }
        .panel { background: var(--color-surface); padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        h3 { font-size: 24px; margin-bottom: 25px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 15px; }
        
        .input-row { display: flex; gap: 20px; margin-bottom: 20px;}
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; color: var(--color-muted); letter-spacing: 1px; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid rgba(0,0,0,0.1); font-family: var(--font-sans); outline: none; background: var(--color-bg);}
        
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--color-muted); font-size: 14px;}
        .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.1); font-size: 20px; font-family: var(--font-serif); }
    </style>
</head>
<body style="background:var(--color-bg);">

    <header class="navbar" id="navbar" style="background: rgba(253, 252, 249, 0.95); padding: 15px 8%; box-shadow: 0 5px 30px rgba(0,0,0,0.05);">
        <a href="index.html" class="logo" style="color: var(--color-text);">SEPM I.</a>
        <a href="book.html" style="color: var(--color-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 2px;">Cancel</a>
    </header>

    <div class="checkout-grid">
        <div class="panel">
            <h3>Secure Payment</h3>
            <form action="index.html">
                <div class="input-group" style="margin-bottom: 20px;">
                    <label>Cardholder Name</label>
                    <input type="text" required placeholder="John Doe" />
                </div>
                <div class="input-group" style="margin-bottom: 20px;">
                    <label>Card Number</label>
                    <input type="text" required placeholder="0000 0000 0000 0000" />
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Expiry Date</label>
                        <input type="text" required placeholder="MM/YY" />
                    </div>
                    <div class="input-group">
                        <label>CVV</label>
                        <input type="text" required placeholder="123" />
                    </div>
                </div>
                <button type="submit" class="btn-submit" style="margin-top: 20px;">Confirm & Pay</button>
            </form>
        </div>

        <div class="panel" style="height: fit-content;">
            <h3>Booking Summary</h3>
            <div class="summary-item">
                <span>Room</span>
                <span>Executive Suite</span>
            </div>
            <div class="summary-item">
                <span>Check-in</span>
                <span>April 21, 2025</span>
            </div>
            <div class="summary-item">
                <span>Nights</span>
                <span>4</span>
            </div>
            <div class="summary-item">
                <span>Taxes & Fees</span>
                <span>$215.00</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span style="color: var(--color-accent);">$2,515.00</span>
            </div>
        </div>
    </div>

</body>
</html>
