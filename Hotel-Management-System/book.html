<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve - SEPM I</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        .page-header { background: url('hotel_lobby.png') center/cover no-repeat; height: 50vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .page-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)); }
        .page-title { color: #fff; font-size: 50px; position: relative; z-index: 1; letter-spacing: 4px; text-transform: uppercase; }
        
        .booking-container { max-width: 800px; margin: -50px auto 100px; background: var(--color-surface); padding: 50px; position: relative; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .form-row { display: flex; gap: 30px; margin-bottom: 30px; }
        @media(max-width: 600px) { .form-row { flex-direction: column; gap: 15px;} }
        
        .form-group { flex: 1; display: flex; flex-direction: column; }
        .form-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--color-muted); font-weight: 600; margin-bottom: 10px; }
        .form-group input, .form-group select { width: 100%; padding: 15px; border: 1px solid rgba(0,0,0,0.1); font-family: var(--font-sans); font-size: 14px; background: var(--color-bg); outline: none; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: var(--color-accent); }
    </style>
</head>
<body>

    <header class="navbar" id="navbar" style="background: rgba(253, 252, 249, 0.95); backdrop-filter: blur(10px); padding: 15px 8%; box-shadow: 0 5px 30px rgba(0,0,0,0.05);">
        <a href="index.html" class="logo" style="color: var(--color-text);">SEPM I.</a>
        <ul class="navlist">
            <li><a href="index.html" style="color: var(--color-text);">Resort</a></li>
            <li><a href="overview.html" style="color: var(--color-text);">Experiences</a></li>
            <li><a href="login.html" style="color: var(--color-text);">Sign In</a></li>
            <li><a href="book.html" class="btn-book">Book Now</a></li>
        </ul>
    </header>

    <div class="page-header">
        <div class="page-overlay"></div>
        <h1 class="page-title">Reserve a Suite</h1>
    </div>

    <div class="booking-container">
        <div class="hero-subtitle">Reservation Details</div>
        <h2 style="margin-bottom: 40px;">Select Your Stay</h2>
        
        <form action="payment.html">
            <div class="form-row">
                <div class="form-group">
                    <label>Check-in Date</label>
                    <input type="date" required />
                </div>
                <div class="form-group">
                    <label>Check-out Date</label>
                    <input type="date" required />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Room Category</label>
                    <select required>
                        <option>Executive Ocean View (A/C)</option>
                        <option>Premium Suite (A/C)</option>
                        <option>Standard Villa (Non-A/C)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bed Type</label>
                    <select required>
                        <option>Single King</option>
                        <option>Double Queen</option>
                        <option>Three Beds</option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 40px;">
                <label>Special Requests</label>
                <input type="text" placeholder="e.g. Late checkout, dietary requirements..." />
            </div>

            <button type="submit" class="btn-submit">Proceed to Payment</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2025 <span>SEPM I.</span> Hotel Management Systems. All Rights Reserved.</p>
    </footer>

</body>
</html>
