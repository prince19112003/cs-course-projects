<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { primary: '#2563EB', secondary: '#4F46E5', background: '#F8FAFC', surface: '#FFFFFF', border: '#E2E8F0', textMain: '#0F172A', textMuted: '#64748B' }
                }
            }
        }
    </script>
    <style>
        body { background-color: theme('colors.background'); color: theme('colors.textMain'); }
        .glass-panel { background: theme('colors.surface'); border: 1px solid theme('colors.border'); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .gradient-text { background: linear-gradient(to right, #2563EB, #4F46E5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .blob { position: absolute; filter: blur(90px); z-index: -1; opacity: 0.2; }
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px white inset !important; -webkit-text-fill-color: #0F172A !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="blob bg-primary w-80 h-80 rounded-full top-[-100px] left-[-100px]"></div>
    <div class="blob bg-secondary w-96 h-96 rounded-full bottom-[-100px] right-[-100px]"></div>

    <a href="index.html" class="absolute top-6 left-6 text-textMuted hover:text-primary flex items-center gap-2 transition-colors font-medium">
        <i class="ri-arrow-left-line"></i> Back to Home
    </a>

    <div class="w-full max-w-md px-6 z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white shadow-sm border border-border mb-6">
                <i class="ri-building-4-fill text-3xl text-primary"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2 text-textMain">Welcome to <span class="gradient-text">Nexus</span></h1>
            <p class="text-textMuted">Enter your credentials to access the portal</p>
        </div>

        <form id="loginForm" class="glass-panel p-8 rounded-3xl">
            <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-lg mb-6 flex items-center gap-2">
                <i class="ri-error-warning-fill"></i> <span>Invalid Email/Phone or password</span>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-textMain mb-2">Email Address or Phone Number</label>
                    <div class="relative">
                        <i class="ri-user-3-line absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="identifier" required class="w-full bg-background border border-border text-textMain rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder-gray-400" placeholder="user@nexus.edu / 9876543210">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-textMain mb-2">Account Password</label>
                    <div class="relative">
                        <i class="ri-lock-line absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" id="password" required class="w-full bg-background border border-border text-textMain rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder-gray-400" placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-primary hover:bg-blue-700 text-white py-3.5 rounded-xl font-bold transition-all shadow-[0_4px_14px_0_rgba(37,99,235,0.3)] hover:shadow-[0_6px_20px_rgba(37,99,235,0.4)] hover:-translate-y-[1px]">
                        Authenticate Securely
                    </button>
                </div>
            </div>
            
            <div class="mt-8 pt-6 border-t border-border text-xs text-textMuted">
                <p class="mb-2 uppercase tracking-wide font-bold text-textMain">Demo Credentials:</p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-background p-3 rounded-lg border border-border">
                        <span class="block text-primary font-bold mb-1">Administrator</span>
                        <span class="text-textMain font-mono text-[11px]">E: admin@nexus.edu<br>P: admin</span>
                    </div>
                    <div class="bg-background p-3 rounded-lg border border-border">
                        <span class="block text-emerald-600 font-bold mb-1">Student</span>
                        <span class="text-textMain font-mono text-[11px]">E: john@nexus.edu<br>Ph: 8888888888<br>P: password</span>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script src="db.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value.trim();
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMsg');

            const user = DB.login(identifier, pass);
            
            if (user) {
                if (user.role === 'admin') window.location.href = 'admin-dashboard.html';
                else if (user.role === 'student') window.location.href = 'student-dashboard.html';
            } else {
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 5000);
            }
        });
        
        const existing = DB.getCurrentUser();
        if(existing) {
             if (existing.role === 'admin') window.location.href = 'admin-dashboard.html';
             else if (existing.role === 'student') window.location.href = 'student-dashboard.html';
        }
    </script>
</body>
</html>
